<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sachin Meier</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <meta name="description" content="Sachin Meier — Senior Software Engineer at River.">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Sachin Meier",
    "url": "https://sachinmeier.com",
    "jobTitle": "Senior Software Engineer",
    "worksFor": {
      "@type": "Organization",
      "name": "River",
      "url": "https://river.com"
    },
    "sameAs": [
      "https://github.com/SachinMeier",
      "https://www.linkedin.com/in/sachinmeier/"
    ]
  }
  </script>
</head>
<body>
  <div id="wrapper" class="wrapper">
    <div id="card" class="card">
        <div class="header">
          <h1 class="name">Sachin Meier</h1>
          <button type="button" id="theme-toggle" class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
        </div>
        <div class="roles">
          <div class="job">Senior Software Engineer @ <a href="https://river.com" target="_blank">River</a></div>
        </div>
        <div id="links" class="links">
          <a id="GitHub" class="track github-purple-hover" target="_blank" rel="noreferrer" href="https://github.com/SachinMeier" aria-label="Sachin Meier on GitHub"><i class="fab fa-github"></i></a>
          <a id="LinkedIn" class="track linkedin-blue-hover" target="_blank" rel="noreferrer" href="https://www.linkedin.com/in/sachinmeier/" aria-label="Sachin Meier on LinkedIn"><i class="fab fa-linkedin-in"></i></a>
        </div>
    </div>
  </div>
  <script>
    const stored = localStorage.getItem('theme');
    const prefersDark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (prefersDark) {
      document.documentElement.classList.add('dark');
      document.querySelector('#theme-toggle i').className = 'fas fa-sun';
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      const icon = document.querySelector('#theme-toggle i');
      const isDark = document.documentElement.classList.contains('dark');
      icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
  </script>
</body>
</html>
